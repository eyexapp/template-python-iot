# Mosquitto MQTT broker configuration
# Used by docker-compose.yml

# ── Listeners ────────────────────────────────────────────────────
listener 1883
protocol mqtt

listener 9001
protocol websockets

# ── Security ─────────────────────────────────────────────────────
# For development: allow anonymous connections
# For production: set to false and configure password_file
allow_anonymous true
# password_file /mosquitto/config/passwd

# ── Persistence ──────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ──────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
